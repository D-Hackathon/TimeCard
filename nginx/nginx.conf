# nginx/nginx.conf
events {}

http {
  sendfile on;
  client_max_body_size 50m;

  upstream django_uwsgi {
    server app:3031;  # uWSGI コンテナ（uwsgi プロトコル; TCP）
  }

  server {
    listen 80;
    server_name _;

    # 静的/メディア
    location /static/ { alias app/static/; }
    location /media/  { alias /media/; }

    # ヘルスチェック（アプリの /healthz を経由）
    location /healthz {
      include uwsgi_params;
      uwsgi_pass django_uwsgi;
      uwsgi_read_timeout 10s;
    }

    # アプリ本体
    location / {
      include uwsgi_params;
      uwsgi_pass django_uwsgi;
      uwsgi_read_timeout 65s;
    }
  }
}
