AWSTemplateFormatVersion: "2010-09-09"
Description: "最小構成テスト用 CloudFormation (EC2 1台のみ)"

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: "SSH接続用の既存キーペア名"
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3a.micro
    Description: "EC2インスタンスのタイプ"

Resources:
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "SSHとHTTPを許可"
      VpcId: !Ref "AWS::NoValue"  # デフォルトVPCを使用
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: ami-0c02fb55956c7d316  # 東京リージョンのAmazon Linux 2
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      Tags:
        - Key: Name
          Value: "TestEC2"

Outputs:
  EC2PublicIP:
    Description: "作成したEC2のパブリックIP"
    Value: !GetAtt EC2Instance.PublicIp
  EC2InstanceId:
    Description: "EC2インスタンスID"
    Value: !Ref EC2Instance
