version: "3.9"

services:
  app:
    build: ./app
    command: uwsgi --ini /app/uwsgi.ini
    env_file:
      - ./app/.env.prod
    volumes:
      - static:/static
      - media:/media
    expose:
      - "3031"           # uWSGI (uwsgi protocol) を TCP 3031 で待ち受け
    restart: unless-stopped

  nginx:
    build: ./nginx
    ports:
      - "80:80"          # ALB→EC2 のターゲットは 80
    volumes:
      - static:/static:ro
      - media:/media:ro
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz | grep -q ok || exit 1"]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  static:
  media:
