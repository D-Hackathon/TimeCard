{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>{% block title %}働ログ{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <header>
        <div class="logo">
            <a href="{% url 'attendance:mypage' %}">
                <img src="{% static 'img/logo.svg' %}" alt="働ログ" width="350" height="120">
            </a>
        </div>

        <h1>{% block page_title %}{% endblock %}</h1>

        <div class="header-right">
            {% block header_actions %}{% endblock %}
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        {% block footer %}{% endblock %}
    </footer>

    {% block extra_scripts %}{% endblock %}

</body>

</html>
